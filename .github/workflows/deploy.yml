name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and Build
        working-directory: ./web-dashboard
        run: |
          npm install
          npm run build

      - name: Create 404.html to handle Single Page App routing
        run: cp web-dashboard/dist/index.html web-dashboard/dist/404.html

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: web-dashboard/dist
          branch: gh-pages
          clean: true
